# Fly.io deployment config. See architecture-design.md §11.1.
# The app name must be globally unique on Fly — change it (and the Netlify
# /api proxy target) if "content-gen-backend" is taken.
app = "content-gen-backend"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[deploy]
  release_command = "alembic upgrade head"
