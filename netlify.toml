# Netlify deployment config. See architecture-design.md §11.2.
# Must live at the repo ROOT: Netlify only reads netlify.toml from the build
# base directory, and this is a frontend/ + backend/ monorepo. `base` below
# points the build into frontend/. Update the /api proxy target if the Fly
# app is not named "content-gen-backend".
[build]
  base = "frontend"
  command = "pnpm install --frozen-lockfile && pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "11"

[[redirects]]
  from = "/api/*"
  to = "https://content-gen-backend.fly.dev/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
